<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnight Moon</title>
    <style>
        /* ここにデザイン（CSS）を書いています */
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #050515, #101030); /* 深夜の夜空のグラデーション */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #fff;
            font-family: 'Georgia', '游明朝', serif; /* エモい雰囲気のフォント */
        }

        /* 月のデザイン */
        .moon {
            width: 150px;
            height: 150px;
            background: #fffae6; /* 優しい月明かりの色 */
            border-radius: 50%;
            box-shadow: 0 0 40px #fffae6; /* 月の光がぼんやり広がるエフェクト */
            animation: pulse 4s infinite ease-in-out;
        }
        @keyframes pulse {
            0% {
                box-shadow: 0 0 30px #fffae6;
                transform: scale(1);
            }
            50% {
                box-shadow: 0 0 60px #fff5cc, 0 0 100px #ffeb99; /* 光が広がる */
                transform: scale(1.02); /* 微かに大きくなる */
            }
            100% {
                box-shadow: 0 0 30px #fffae6;
                transform: scale(1);
            }
        }
    </style>
</head>
<body>

    <div class="moon"></div>

</body>
</html>
